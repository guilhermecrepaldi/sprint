<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strava da Matemática — Protótipo</title>
  <link rel="stylesheet" href="tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #2a2925; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }

    .stage {
      position: relative;
      transform-origin: center center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
      border-radius: 28px;
      overflow: hidden;
    }

    .stage[data-theme='dark'] { box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08); }

    /* Submit loading overlay */
    .submit-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(2px);
      z-index: 100;
      animation: fadeIn 180ms ease;
    }
    .submit-overlay .card {
      background: var(--surface);
      color: var(--ink);
      padding: 24px 28px;
      border-radius: 12px;
      border: 1px solid var(--hairline);
      min-width: 260px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .submit-overlay .progress {
      height: 4px; background: var(--field); border-radius: 999px; overflow: hidden;
    }
    .submit-overlay .progress > div {
      height: 100%; background: var(--ink); transition: width 200ms linear;
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .screen-transition > * { animation: slideUp 220ms cubic-bezier(.2,.7,.3,1); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/icons.jsx"></script>
  <script type="text/babel" src="components/ink-canvas.jsx"></script>
  <script type="text/babel" src="components/sample-data.jsx"></script>
  <script type="text/babel" src="components/folha-safe.jsx"></script>
  <script type="text/babel" src="components/folha-bold.jsx"></script>
  <script type="text/babel" src="components/result-safe.jsx"></script>
  <script type="text/babel" src="components/result-bold.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const DEVICE_W = 800;
    const DEVICE_H = 1240;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "white",
      "variation": "safe"
    }/*EDITMODE-END*/;

    function Prototype() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // URL deeplink: ?screen=result
      const initialScreen = (() => {
        try {
          const params = new URLSearchParams(window.location.search);
          return params.get('screen') === 'result' ? 'result' : 'folha';
        } catch (_) { return 'folha'; }
      })();
      const [screen, setScreen] = React.useState(initialScreen);
      const [isSubmitting, setIsSubmitting] = React.useState(false);
      const [submitProgress, setSubmitProgress] = React.useState(0);
      const [pageIndex, setPageIndex] = React.useState(1);
      const [elapsed, setElapsed] = React.useState(0); // seconds

      // Timer ticks while on folha
      React.useEffect(() => {
        if (screen !== 'folha') return;
        const id = setInterval(() => setElapsed(e => e + 1), 1000);
        return () => clearInterval(id);
      }, [screen]);

      const elapsedStr = React.useMemo(() => {
        const m = Math.floor(elapsed / 60);
        const s = elapsed % 60;
        return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      }, [elapsed]);

      const handleSubmit = () => {
        setIsSubmitting(true);
        setSubmitProgress(0);
        const total = window.SAMPLE_EXERCISES.length;
        let step = 0;
        const interval = setInterval(() => {
          step += 1;
          setSubmitProgress(step / total);
          if (step >= total) {
            clearInterval(interval);
            setTimeout(() => {
              setIsSubmitting(false);
              setScreen('result');
            }, 280);
          }
        }, 380);
      };

      const handleNext = () => {
        setPageIndex(i => i + 1);
        setElapsed(0);
        setScreen('folha');
      };

      // Scaling stage to fit viewport
      const stageRef = React.useRef(null);
      const [scale, setScale] = React.useState(1);
      React.useEffect(() => {
        const fit = () => {
          const margin = 32;
          const sx = (window.innerWidth - margin) / DEVICE_W;
          const sy = (window.innerHeight - margin) / DEVICE_H;
          setScale(Math.min(sx, sy, 1));
        };
        fit();
        window.addEventListener('resize', fit);
        return () => window.removeEventListener('resize', fit);
      }, []);

      // Pick which screen component to render
      const screenContent = (() => {
        if (screen === 'folha') {
          const Comp = t.variation === 'bold' ? FolhaScreenBold : FolhaScreenSafe;
          // Note: FolhaScreen components have their own onSubmit wiring would be ideal,
          // but we hijack via a sibling submit button intercept. Simpler: inject onSubmit
          // by wrapping. For prototype, we re-render same components, then put our own
          // submit hook by patching window.__submitProto.
          return (
            <Comp
              theme={t.theme}
              elapsed={elapsedStr}
              pageIndex={pageIndex}
              drawable={true}
              showThermometer={true}
              thermometerValue={0.62}
              initialInk={null}
              onSubmit={handleSubmit}
            />
          );
        }
        const Comp = t.variation === 'bold' ? PageResultScreenBold : PageResultScreenSafe;
        return (
          <Comp
            theme={t.theme}
            pageIndex={pageIndex}
            onNext={handleNext}
          />
        );
      })();

      // The folha components don't currently accept onSubmit prop; intercept clicks on the Enviar button via delegation.
      const onClickStage = (e) => {
        const target = e.target.closest('button');
        if (!target) return;
        const txt = (target.textContent || '').trim();
        if (screen === 'folha' && txt.startsWith('Enviar')) {
          e.preventDefault();
          handleSubmit();
        }
      };

      return (
        <>
          <div
            ref={stageRef}
            className="stage screen-transition"
            data-theme={t.theme}
            onClick={onClickStage}
            style={{
              width: DEVICE_W,
              height: DEVICE_H,
              transform: `scale(${scale})`,
            }}
            key={screen + '-' + pageIndex}
          >
            {screenContent}
            {isSubmitting && (
              <div className="submit-overlay" data-theme={t.theme}>
                <div className="card">
                  <span className="eyebrow" style={{ fontSize: 10 }}>Enviando folha</span>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
                    <span className="mono" style={{ fontSize: 24, fontWeight: 500 }}>
                      {Math.round(submitProgress * window.SAMPLE_EXERCISES.length)}
                    </span>
                    <span className="mono" style={{ fontSize: 14, color: 'var(--ink-3)' }}>
                      / {window.SAMPLE_EXERCISES.length}
                    </span>
                    <span className="mono" style={{ fontSize: 12, color: 'var(--ink-2)', marginLeft: 6 }}>
                      campos corrigidos
                    </span>
                  </div>
                  <div className="progress">
                    <div style={{ width: `${submitProgress * 100}%` }} />
                  </div>
                </div>
              </div>
            )}
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Tema" />
            <TweakRadio
              label="Aparência"
              value={t.theme}
              onChange={v => setTweak('theme', v)}
              options={['white', 'dark']}
            />
            <TweakSection label="Variação visual" />
            <TweakRadio
              label="Direção"
              value={t.variation}
              onChange={v => setTweak('variation', v)}
              options={['safe', 'bold']}
            />
            <TweakSection label="Navegação" />
            <TweakRadio
              label="Tela"
              value={screen}
              onChange={v => setScreen(v)}
              options={['folha', 'result']}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Prototype />);
  </script>
</body>
</html>
